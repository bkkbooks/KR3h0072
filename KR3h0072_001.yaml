body:
  text: 傳神祕要金壇蔣驥撰傳神以逺取神法傳神最大者令彼隔几而坐可逺三四尺許若小照可逺五六尺許愈小宜愈逺畫部位或可近畫眼珠必宜逺凡人相對而坐近在一二尺則相視不用目力無力則無神若逺至丈許或至數丈人愈逺相視愈有力有力則有神且無力之視眼皮垂下有力之視眼皮撑起畫者須於未畫部位之先即留意其人行止坐卧歌呼談笑見其天真發現神情外露此處細察然後落筆自有生趣凡傳神須得居髙臨下之意㸃睛取神法㸃睛取神尤宜髙逺凡人眼向我視其神拘眼向前視其神廣所謂拘者拘於尺寸之地祗有一面廣則上下四方皆其所目覩耳畫眼皮用筆得其輕重亦取神之要處凡人有意欲畫照其神已拘泥我須當未畫之時從旁窺探其意思彼以無意露之我以有意窺之意思得即記在心上所謂意思青年者在烘染髙年者在皺紋烘染得其淺深髙下皺紋得其長短輕重也若令人端坐後欲求其神已是畫工俗筆宋陳造曰著眼於顚沛造次應對進退顰笑適悅舒急倨敬之頃熟視而默識一得佳思亟運筆墨此論最佳眼珠上下分寸人之瞳神有上視平視下視怒視之别視下則無神視上失之太髙大槩下視則眼珠下半藏在下眼皮內上視反此怒視則眼珠上下全露若平視則眼珠亦平髙逺則下半眼珠略帶上其眼珠下半亦帶圓意或上半眼珠竟小半在上眼皮內而下半眼珠竟極圓又有下半眼珠之下下眼皮之上中間微露一絲空地其神愈出者不可不知合揣上視下視怒視之别始知平視帶上為執中之道要之上視下視其神拘於上下平視其神近平視帶上其神開闊耳故訣不在眼珠中黑㸃在上下眼皮在兩眼稍又在兩眼珠之兩圈上下再眼角裏嘗有眼肉及眼稍頭黑影必須畫出而下半眼珠必當圓於上半眼珠至眼亦有大小不可任意為之當以鼻之大小比數大抵寫照難在兩目前言已約略分别但須得其人之自然不可少有假借勉强有一種人眼睛全無神氣或是近視必執此為板法反致拘牽矣笑容部位不同笑格每不同大笑失部位喜笑或眼合取笑之法當窺其人心中得意而口尚未言神有所注而外貌微露若徒有笑容不能得兩目之神亦所不取取笑法面上取笑處眉宜低又宜彎眼宜挑并魚尾夀帶鬚根口角等處口角略放起察其出進髙下因部位略有更變與常格不同也如遇鐵面翁强畫作彌勒相必至部位俱失之矣宜先以格局畫定再以笑容更易之自然精細神情神在兩目情在笑容故寫照兼此兩字為妙能得其一已髙庸手一籌若泥塑木偶風斯下矣閃光面上凹凸處以顔色深淺分之惟兩頥及深眼眶或半側面皆有閃光略用檀子染之擅子以墨和燕支赭石烘出髙處但此色不可多用緣檀子顔色重濁易致汙穢檀子近看即是黑氣不可多用氣色氣色在微茫之間青黃赤白種種不同淺深又不同氣色在平處閃光是凹處凡畫氣色當用暈法暈者四面無痕迹察其深淺亦層層積出為妙用全面顔色法顔色非氣色之謂或面白其兩顴有紅氣色或面黃其額上有青氣色故氣色主一處顔色主全面畫者各種顔色層層烘染畫完後顔色自然和潤又有一種畫法眶格既定即以各樣顔料看面色配好以供全面之用不以燕脂藤黃另起爐灶此法古人常用之此法以一樣顔色淺處淺用深處深用凡閃光氣色俱如之不於面上另加顔色而顔色亦俱和潤也籠墨畫定眶格以淡墨籠之閃光處又用淡墨烘染再加粉和顔色畫此亦另有隂秀古雅之趣今人有以顔色畫好用淡墨籠在顔色上如畫山水法者此法但須先礬否則墨色入粉便成黑氣用筆總論用筆以潔净為主古人畫眶格皆有筆法又能潔净見有皺紋眶格用筆極粗而眉目栩栩欲動此兼能以筆力勝者其次用筆短落筆輕乾淡漸加細潔圓潤耳落筆要從空中下來起頭則輕靈至運行不可一直直則板此論畫鬚眉用筆四要一曰凖凖者何有規矩而目力有凖然後下筆有凖也如臨全面眶格圖其算法為規矩用目力算之其大小相似即謂之凖由是得其規矩收小放大可以變化板法矣二曰烘烘者何即染之謂也人之面格髙下須用顔色烘托烘法惟潤色全面以顔色畫上筆以濕為主則有氣韻烘染處要潔净三曰砌凡面上有斑㸃或染有不到俱以砌補之或面上氣色深者竟不用烘以顔色砌之砌後仍可用染也又有不用染純用砌者即俗所謂乾皴是也筆法枯潤適中約似小麻皮皴米粒皴皴疏砌密小有異耳砌在微茫之間其筆意可見然終以痕跡渾融為妙砌染烘染可兼用可先後用或祗烘不用砌亦可或純用砌俱可四曰提設色將足看面上凹凸處用檀子等色提醒然後格局分明髙下顯露砌染虛實不同畫大者須染得到各色和潤為主中者如之若小者則染皴處有當簡省愈小愈可省全在兩眼得神耳面上竟有有痕跡處可酌量省去善㑹心者自得之起手訣以古人畫作式傳神起手先打眶格初學用筆須極輕淡次學用目力以極凖為度學用目力即畫鼻凖與鼻子及定兩眼角等處也所云兩㸃不可髙低兩空地須極勻逐一畫上由鼻凖畫至兩鬢髮際全在目力有凖學者起手摹鼻凖次摹定兩眼角法再將全面眶格圖逐一摹其長短大小斷不可以紙加在畫上臨摹即俗語所謂印在下面畫也如印畫則不用目力目力無凖雖知算法動亦多謬此有訣無益也摹法以原本置案上于旁設素紙用目力算其分寸而作之其大小與原本相同再將全面大收小小放大畫十數次愈學習愈凖學到部位毫髮不走然後謂之凖此須細心體味能收大放小即是變化板法學者眶格打好功已過半矣用筆層次先將紙摺中縫一畫兩鼻孔二畫鼻凖下一筆三畫鼻凖四畫鼻先左後右凡有兩相對者皆如之五畫兩眼角或定山根亦可六畫左右兩眼稍七畫左右眼上一筆八畫左右眼下一筆九畫眼珠十畫鼻梁十一畫上下眼皮十二畫上眼眶兩筆十三畫下眼眶兩筆十四畫兩眉十五定地角依王思善畫法畫下庭不先畫地角鼻凖下即畫人中口唇亦可十六定下口唇十七畫口中一筆十八畫上口唇十九畫下口唇二十畫皴摺痕及髮鬚髯無鬚畫夀帶筆意亦有輕重二十一畫全地角二十二畫左右兩太陽二十三畫兩顴二十四畫兩頥二十五畫兩耳二十六畫兩鬢如露頂即畫髮際如戴冠即畫帽簷二十七畫衣領微畫兩眉王思善寫像訣云先鼻次鼻凖鼻凖下或印堂一筆或眼堂邊一筆或中側邊一筆次人中次口次眼堂次眼次眉次頰次髮際次髮次耳次頭次打圈打圈者面部也鼻凖與鼻相參核法鼻凖與鼻得分寸則全面有把握故先論之以鼻凖作十分算定鼻之大小則鼻有半鼻凖者有半鼻凖又零幾分者有鼻小不及半鼻凖者再以鼻作十分算定鼻凖之寬狹則鼻凖有一鼻幾分者有兩鼻幾分者總以鼻橫數去定之必相合無訛為要笑容則鼻凖與鼻不同常格大抵笑容則鼻起而略大起稿算全面分寸法另紙起稿部位便於改換宋人凡作一畫必先呈稿然後上真古人細心尚如此一畫兩鼻孔鼻孔作兩㸃兩㸃不可髙低兩空地須極勻空地言兩者以中縫分也二畫鼻凖下一筆三畫鼻凖兩筆四畫鼻鼻凖與鼻兩相參核畫得極凖然後可以鼻凖與鼻為主鼻凖作大尺橫作十分算鼻作小尺豎作十分算以一鼻再橫作十分算凡面之髙下長短濶狹處皆用比之以直之分數算過再以橫之分數算之自無錯誤五畫兩眼角即以鼻逆數上比之有二子幾分三子幾分以及四子者定上下所在出進用直線法或對鼻筆痕或於鼻之中或於鼻之外或於鼻之幾分以定出進所在再用王思善法於三筆中取一筆畫下看山根之間能容眼之濶狹有幾許細細看凖面之部位此處為最要王思善寫像祕訣云鼻凖既成以之為主若山根髙處印堂一筆下來如低取眼堂邊一筆下來或不髙不低在乎八九分中側邊一筆下來六畫左右兩耳稍如已畫山根即以山根濶狹作比或以鼻凖作比俱可或半鼻凖或幾鼻幾分王思善曰眼中白粉染瞳神外空地次用煙子㸃晴墨打圈眼稍微起有摺便笑七畫左右眼上一筆八畫左右眼下一筆此一筆須極輕淡不可著痕迹於設色時更宜留心九畫眼珠十畫鼻梁十一畫上下眼皮十二畫上眼眶兩筆從眼上一筆算起或一鼻幾分或二鼻幾分再用眼比或一眼幾分二眼幾分十三畫下眼眶兩筆比法同上眼眶如有睹肉者則如定眼角法亦以鼻數上比之十四畫兩眉有不離眼眶者有離幾分者再看印堂之方正扁長此則中庭定矣十五定地角約以中庭比定十六定下口唇十七畫口中一筆兩角須逐漸長出亦用直線法察口角止處出鼻幾分對眼睛何處十八畫上口唇十九畫下口唇其厚薄亦以鼻比數二十畫鬚髯無鬚畫夀帶二十一畫全地角此則下庭定矣二十二畫左右兩太陽以眼作十分算有容一眼幾分或不及一眼者或以鼻比數亦可此部位之緊要切不可忽二十三畫兩顴顴有上下須察其最出所在出對何處進對何處最出處亦用直線或出太陽幾分或進幾分有顴小而髙處在面心上者須用顔色染出二十四畫兩頥頥邊一筆須用兩斷齊鼻下平去作上一斷口唇橫看作下一斷上斷以鼻凖或鼻比數下斷以口唇濶狹比數口唇亦可作十分算也訣總在用橫線法即接著齊鼻平去一筆約數或一鼻凖有餘或兩鼻凖肥者再加再以鼻比數或四鼻或五六鼻皆可比定大約宜瘦不宜肥宜進不宜出可稍加修改無致筆滓墨涴二十五畫兩耳耳之上下無定大約不離眼眶上下二十六畫兩鬢如露頂即畫髮際若戴冠者畫帽簷此則上庭定矣全局面上全局可以上庭比中庭中庭比下庭長短濶狹兩兩相比則大局可得或云落筆先左後右大像先用淡墨定局次加擅子砌染此法亦頗近理并附及之生紙畫法生紙畫極難以落筆略重無從改易其法脫稿紙上即著粉極勻兩圈邊上不可有顔色滲出即帶濕烘染深淺如法俟乾以手摹去粗粉及紙上粗屑又配顔色潤全面其烘染如前顔色由淡而深畫兩三次或再加砌染用檀子提醒深處礬紙畫法用礬紙脫稿將手摩去紙上粗屑又加礬一遍恐􅈨紙不透用顔色烘染氣色其低處即用檀子三朱等色畫到亦看面上全部氣色和粉上之極輕薄而勻俟乾亦摩去浮粉配顔色潤全面再加烘染以無粉氣為度凡畫背後須再托粉粉中少用顔色和之設色層次設色無一定層次約略言之脫稿後第一層用檀子醒深處第二層檀子染第三層三朱燕支染上口唇用燕支加淡墨畫下口唇加三朱畫用色亦有淺深非一抹即已也口唇亦有不用墨上口唇紅下口唇淡者俱在臨時配合第四層用粉合入三朱藤黃面赤者和赭石空瞳神眼白不用著粉餘俱著勻第五層用礬第六層用顔色潤全面再加染染無層次以染足為度瞳神凡染一次㸃一次漸漸積深加烟煤㸃睛及畫上眼皮鬚眉最黑處輕輕略醒惟下眼皮一筆用燕支畫痕迹不宜重用粉用粉以無粉氣為度此事常有過不及之弊太過者雖無粉氣未免筆墨重濁不及者神氣不完即無生趣故畫法從淡而起加一遍自然深一遍不妨多畫幾層淡則可加濃則難退須細心參之以恰好為主用粉不一法有用膩粉者取其不變顔色有用鉛粉者須製得好然用蛤粉最妙不變色兼有光彩蛤粉製法先將殼上一層黑皮去净研極細用之又有上面不用粉惟背後托粉者其法亦是不論生紙􅈨紙俱可補綴設顔色有不和處仍將薄粉籠之再加烘染此亦補綴之道籠粉後俟乾亦須摩去粗粉再染火氣顔色不純熟及用粉太重便多火氣故用􅈨紙畫略好用生紙畫為難也前論用淡墨先籠若面眶小者此法亦不可用欲除火氣須多臨古人筆墨氣韻筆底深秀目然有氣韻此關係人之學問品詣人品高學問深下筆自然有書卷氣有書卷氣即有氣韻白描白描打眶格尤宜淡東坡云吾嘗於燈下顧見頰影使人就壁畫之不作眉目見者皆知其為我夫鬚眉不作豈復設色乎設色尚有部位見長白描則專在兩目得神其烘染用淡墨或少以赭石和墨亦可筆法須潔净輕細得其輕重為要面上惟鼻及眼皮眉目口唇有筆墨痕迹若鼻凖眉骨兩顴兩頥山根一筆中側邊一筆眼眶上下兩筆髮際打圈須用淡墨烘出故打眶格尤宜淡也臨摹學者從師求其規矩既得規矩須自臨摹多臨古人好畫則設色精妙脫去火氣如僅以庸師所作學之則筆不流於汚俗必習於澆薄矣蓋前人之畫色澤純和筆法沉秀學者臨至百餘遍自然與衆手不同傳神祕要
